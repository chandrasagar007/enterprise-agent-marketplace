version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    # 🚀 CHANGED: This guarantees Docker injects your keys securely
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: rq worker enterprise_tasks --url redis://redis:6379/0
    # 🚀 CHANGED: This guarantees the worker gets the Langfuse keys
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHON_CMD=python
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  ui:
    build: .
    command: python -m streamlit run app_ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api